<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Indie Music Video sample cover</title>
  <desc id="desc">Gradient cover image for the Indie Music Video Concept sample project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69" />
      <stop offset="50%" stop-color="#ff5a5f" />
      <stop offset="100%" stop-color="#ffb703" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="40" />
  <circle cx="320" cy="260" r="170" fill="rgba(255,255,255,0.12)" />
  <circle cx="920" cy="450" r="220" fill="rgba(255,255,255,0.1)" />
  <polygon points="350,220 350,420 520,320" fill="#ffffff" opacity="0.92" />
  <rect x="610" y="180" width="420" height="300" rx="30" fill="rgba(20,20,30,0.26)" stroke="rgba(255,255,255,0.24)" />
  <text x="610" y="560" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Indie Music Video</text>
  <text x="610" y="618" fill="rgba(255,255,255,0.92)" font-family="Inter, Arial, sans-serif" font-size="30">Storyboards, editing, and production planning</text>
</svg>
