<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CoCreate logo</title>
  <desc id="desc">Rounded square purple to orange gradient icon with interlocking CoCreate C marks and center spark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f2dbd"/>
      <stop offset="55%" stop-color="#5a189a"/>
      <stop offset="100%" stop-color="#f7a24d"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd0a5"/>
      <stop offset="100%" stop-color="#f28a3c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="10" dy="14" stdDeviation="12" flood-color="#2a0c49" flood-opacity="0.32"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="8" stdDeviation="8" flood-color="#3c1459" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="92" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <path d="M119 415l34-108" stroke="url(#warm)" stroke-width="30" stroke-linecap="round"/>
    <path d="M150 310a138 138 0 0 1 242-94" fill="none" stroke="url(#warm)" stroke-width="34" stroke-linecap="round"/>
    <path d="M351 218l91-78" fill="none" stroke="url(#warm)" stroke-width="34" stroke-linecap="square"/>
    <path d="M208 338a86 86 0 0 1 139-67" fill="none" stroke="url(#warm)" stroke-width="28" stroke-linecap="round"/>
    <path d="M149 405a144 144 0 0 0 242 31" fill="none" stroke="url(#warm)" stroke-width="34" stroke-linecap="round"/>
    <path d="M283 430h104" fill="none" stroke="url(#warm)" stroke-width="34" stroke-linecap="square" opacity="0.9"/>
  </g>

  <g filter="url(#soft)">
    <path d="M110 401l34-108" stroke="#ffffff" stroke-width="30" stroke-linecap="round"/>
    <path d="M141 296a138 138 0 0 1 242-94" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
    <path d="M342 204l91-78" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="square"/>

    <path d="M199 324a86 86 0 0 1 139-67" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
    <path d="M140 391a144 144 0 0 0 242 31" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
  </g>

  <path d="M151 395a144 144 0 0 0 242 31" fill="none" stroke="url(#warm)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M210 324l132-120" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" filter="url(#soft)"/>

  <circle cx="256" cy="256" r="16" fill="#ffffff"/>
  <g stroke="#ffffff" stroke-linecap="round" stroke-width="10">
    <path d="M256 215v-26"/>
    <path d="M256 323v-26"/>
    <path d="M215 256h-26"/>
    <path d="M323 256h-26"/>
    <path d="M226 226l-18-18"/>
    <path d="M304 304l-18-18"/>
    <path d="M286 226l18-18"/>
    <path d="M208 304l18-18"/>
  </g>
</svg>
